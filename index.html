<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>כתיבה חמישי ערב - המרחב השיתופי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Amatic+SC:wght@400;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- עיצוב מקיף ---
        const style = document.createElement('style');
        style.textContent = `
            :root { --main-bg: #fde2e4; --pencil-gray: #7a9eb5; --marker-color: #fff3b0; --sketch-pink: #ffaaea; }
            html { scroll-behavior: smooth; overflow-x: hidden; }
            body { font-family: 'Assistant', sans-serif; background-color: var(--main-bg); color: var(--pencil-gray); margin: 0; min-height: 100vh; overflow-x: hidden; transition: background-color 0.8s ease; background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png"); -webkit-overflow-scrolling: touch; }
            
            body.view-writing { --main-bg: #fde2e4; --pencil-gray: #7a9eb5; --marker-color: #fff3b0; }
            body.view-illustrations { --main-bg: #e6f7e9; --pencil-gray: #4a7c59; --marker-color: #ffd1dc; }
            body.view-portfolio { --main-bg: #2b50d8; --pencil-gray: #ffffff; --marker-color: #c1fba4; }
            
            body.view-illustrations .main-title-area, body.view-portfolio .main-title-area { display: none; }
            body:not(.view-writing) .background-doodles { display: none; }

            .handwritten { font-family: 'Amatic SC', cursive; }
            .kalam { font-family: 'Kalam', cursive; }
            .sketch-border { border: 2px solid var(--pencil-gray); border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; position: relative; }
            
            /* מודאלים */
            .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; padding: 1.5rem; align-items: center; justify-content: center; }
            .modal.active { display: flex !important; }
            .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); z-index: -1; }
            .modal-popup { background: rgba(255, 255, 255, 0.94) !important; backdrop-filter: blur(15px); max-width: 520px; width: 100%; border-radius: 35px; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4); padding: 2.5rem; position: relative; border: 1px solid rgba(255,255,255,0.6); color: #1a202c !important; max-height: 88vh; overflow-y: auto; }
            
            .close-btn { position: absolute; top: 1.2rem; left: 1.2rem; width: 42px; height: 42px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; border: none; font-size: 1.4rem; color: #2d3748; z-index: 100; transition: transform 0.2s; }
            .close-btn:hover { transform: scale(1.1); background: #f1f5f9; }

            .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: white; z-index: 9999; transition: right 0.4s ease; border-left: 2px solid var(--pencil-gray); padding: 2rem; color: #333 !important; }
            .sidebar.active { right: 0; }
            .sidebar .nav-item { color: #333 !important; cursor: pointer; margin-bottom: 1.8rem; font-size: 2.4rem; }
            
            .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 9990; }
            .overlay.active { display: block; }
            
            .marker-highlight { background-color: var(--marker-color); padding: 2px 10px; display: inline-block; transform: rotate(-1.5deg); border-radius: 4px; color: var(--pencil-gray) !important; }
            input, textarea { background: rgba(255,255,255,0.95); border: 2px solid #e2e8f0; border-radius: 16px; padding: 16px; font-size: 16px !important; width: 100%; color: var(--pencil-gray); margin-bottom: 1.4rem; }
            input::placeholder, textarea::placeholder { color: var(--pencil-gray); opacity: 0.6; }
            
            .illustration-card-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; background: #fff; border-radius: 12px; }
            .participant-image { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px dashed var(--pencil-gray); margin: 0 auto 1.5rem; background: white; }
            
            .action-buttons { position: absolute; top: 12px; left: 12px; display: flex; gap: 10px; z-index: 20; opacity: 0; transition: opacity 0.3s; }
            .sketch-border:hover .action-buttons { opacity: 1; }
            .btn-icon { background: white; border-radius: 50%; padding: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: pointer; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }

            /* Background Doodles */
            .background-doodles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.2; overflow: hidden; }
            .doodle { position: absolute; fill: none; stroke: var(--pencil-gray); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
            .doodle-heart { width: 45px; }
            .doodle-heart.filled { fill: var(--sketch-pink); stroke: var(--pencil-gray); stroke-width: 1; }
            
            /* עיצוב המדבקות הנטויות (Square Stickers) */
            .sticker-illustration {
                background: white;
                padding: 6px;
                border: 4px solid white;
                border-radius: 12px;
                box-shadow: 0 6px 15px rgba(0,0,0,0.15);
                width: 130px; 
                height: 130px;
                display: flex; 
                align-items: center; 
                justify-content: center;
                overflow: hidden;
            }
            
            .sticker-illustration img {
                width: 100%;
                height: 100%;
                object-fit: cover; /* חיתוך מרובע שמראה את המרכז */
                object-position: center;
                border-radius: 6px;
            }
            
            .sticker-illustrations { transform: rotate(-5deg); }
            .sticker-portfolio { transform: rotate(7deg); }

            /* תיקון צבעי פונט לכפתורי סינון */
            .filter-btn { color: var(--pencil-gray) !important; background-color: rgba(255, 255, 255, 0.4); border: 1px solid rgba(122, 158, 181, 0.3); }
            .filter-btn.active { color: #333 !important; background-color: white; border-color: white; }

            .no-scrollbar::-webkit-scrollbar { display: none; }
            @media (max-width: 768px) { 
                .header-content h1 { font-size: 2.8rem !important; } 
                .header-content h2 { font-size: 2.5rem !important; }
                .sticker-illustration { width: 90px; height: 90px; padding: 4px; border-width: 3px; }
                .main-title-area { gap: 10px; }
            }
        `;
        document.head.appendChild(style);

        // --- אתחול Firebase ---
        let db, auth, currentUser;
        const appId = 'workshop-site-v3';

        const firebaseConfig = {
            apiKey: "AIzaSyDBR2ds88xpHctIRolKjfxObCpFEtgjJDc",
            authDomain: "sadnat-ktiva-26.firebaseapp.com",
            projectId: "sadnat-ktiva-26",
            storageBucket: "sadnat-ktiva-26.firebasestorage.app",
            messagingSenderId: "468181605477",
            appId: "1:468181605477:web:23be0e2e4402eb4842fa8c",
            measurementId: "G-ECZVXSLBQ3"
        };

        const initFirebase = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    setupListener('stories', d => { workshopData = d; if(activeView==='writing') renderUI(); });
                    setupListener('participants', d => { participantsData = d; if(activeView==='portfolio') renderUI(); });
                    setupListener('illustrations', d => { illustrationsData = d; if(activeView==='illustrations') renderUI(); });
                }
            });
        };

        initFirebase();

        // --- לוגיקה ---
        let workshopData = [], participantsData = [], illustrationsData = [], activeView = 'writing', currentFilter = 'הכל';
        let editingId = null;

        const cardColors = ['#e2eafc', '#fef9ff', '#d8f3dc', '#fefae0', '#f7d9da'];
        const tilts = ['rotate-[-1deg]', 'rotate-[1deg]', 'rotate-[-1.5deg]', 'rotate-[1.5deg]'];

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.setView = (v) => {
            activeView = v;
            document.body.className = `view-${v} p-4 pb-32`;
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            renderUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.closeModal = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.body.style.overflow = '';
            editingId = null;
            document.querySelectorAll('form').forEach(form => form.reset());
        };

        window.openStory = (id) => {
            const s = workshopData.find(x => x.id === id);
            if(!s) return;
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mAuthor').innerText = "מאת: " + s.author;
            document.getElementById('mText').innerText = s.content;
            
            const doodleContainer = document.getElementById('mDoodleContainer');
            if (s.doodle) {
                doodleContainer.innerHTML = `<img src="${s.doodle}" class="max-w-full rounded-2xl shadow-xl mb-6 border-4 border-white">`;
                doodleContainer.classList.remove('hidden');
            } else {
                doodleContainer.innerHTML = '';
                doodleContainer.classList.add('hidden');
            }
            document.getElementById('viewModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.openAddModal = () => {
            editingId = null;
            document.querySelectorAll('form').forEach(f => f.reset());
            const mId = activeView === 'writing' ? 'addModal' : activeView === 'portfolio' ? 'addPartModal' : 'addIllusModal';
            document.getElementById(mId).classList.add('active');
            document.body.style.overflow = 'hidden';
            
            if (activeView === 'writing') document.getElementById('sb').innerText = 'פרסום';
            else if (activeView === 'portfolio') document.getElementById('pb').innerText = 'הוספה';
            else if (activeView === 'illustrations') document.getElementById('ib').innerText = 'שמירה';
        };

        window.startEditStory = (e, id) => {
            e.stopPropagation();
            const s = workshopData.find(x => x.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('t').value = s.title;
            document.getElementById('a').value = s.author;
            document.getElementById('c').value = s.content;
            document.getElementById('sb').innerText = 'עדכון';
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.deleteItem = async (e, colName, id) => {
            e.stopPropagation();
            if (!confirm("בטוח.ה שברצונך למחוק?")) return;
            try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id)); } catch (err) { alert(err.message); }
        };

        async function save(col, data, btnId) {
            if(!db || !currentUser) return;
            const btn = document.getElementById(btnId);
            btn.disabled = true; const originalText = btn.innerText;
            btn.innerHTML = `שומר.ת...`;
            
            try {
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', col, editingId), { ...data, updatedAt: Date.now() });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), { ...data, timestamp: Date.now(), createdBy: currentUser.uid });
                }
                closeModal();
            } catch (e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerText = originalText; }
        }

        // פונקציה חדשה לדחיסת תמונה לפני העלאה - פותרת את בעיית ה-Error
        async function compressAndToBase64(file) {
            if (!file) return null;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // מגבילים גודל למניעת שגיאת תווים ארוכה מדי
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // מחזירים גרסה דחוסה (0.7 איכות) שתתאים למגבלות Firestore
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        window.hSaveStory = async e => { 
            e.preventDefault(); 
            const doodleBase = await compressAndToBase64(document.getElementById('sd').files[0]); 
            const data = { title: document.getElementById('t').value, author: document.getElementById('a').value, content: document.getElementById('c').value }; 
            if (doodleBase) data.doodle = doodleBase; 
            save('stories', data, 'sb'); 
        };
        
        window.hSavePart = async e => { 
            e.preventDefault(); 
            const pBase = await compressAndToBase64(document.getElementById('pp').files[0]); 
            const data = { fullName: document.getElementById('fullName').value }; 
            if(pBase) data.photo = pBase; 
            save('participants', data, 'pb'); 
        };
        
        window.hSaveIllus = async e => { 
            e.preventDefault(); 
            const pBase = await compressAndToBase64(document.getElementById('ip').files[0]); 
            const data = { title: document.getElementById('it').value }; 
            if(pBase) data.photo = pBase; 
            save('illustrations', data, 'ib'); 
        };

        function setupListener(col, cb) {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', col), s => {
                cb(s.docs.map(x => ({ id: x.id, ...x.data() })).sort((a,b) => b.timestamp - a.timestamp));
            });
        }

        function renderUI() {
            const main = document.getElementById('mainContent');
            const icons = document.getElementById('viewIcons');
            icons.innerHTML = '';
            
            if(activeView === 'writing') {
                renderW(main);
                // דף ראשון - ללא תמונה
            }
            else if(activeView === 'illustrations') {
                renderI(main);
                // מדבקת נמר מרובעת משמאל לכותרת
                icons.innerHTML = `
                <div class="sticker-illustration sticker-illustrations">
                    <img src="./tiger.png" alt="נמר" onerror="this.parentElement.style.display='none'">
                </div>`;
            }
            else if(activeView === 'portfolio') {
                renderP(main);
                // מדבקת נמר מרובעת לחברים משמאל לכותרת
                icons.innerHTML = `
                <div class="sticker-illustration sticker-portfolio">
                    <img src="./friends_tiger.png" alt="נמר חברים" onerror="this.parentElement.style.display='none'">
                </div>`;
            }
            
            document.getElementById('sectionTitle').innerText = activeView === 'writing' ? 'המגזימים עם הכיבוד' : activeView === 'illustrations' ? 'האיורים של איוי' : 'החברים מהסדנה';
        }

        function renderW(el) {
            const authors = ['הכל', ...new Set(workshopData.map(s => s.author))];
            let h = `<div class="flex overflow-x-auto gap-3 mb-8 pb-2 no-scrollbar">` + authors.map(a => `<button onclick="setFilter('${a}')" class="px-6 py-2 rounded-full handwritten text-2xl filter-btn ${currentFilter===a?'active':''}">${a}</button>`).join('') + `</div><div class="grid grid-cols-1 md:grid-cols-3 gap-8">`;
            const filtered = currentFilter === 'הכל' ? workshopData : workshopData.filter(s => s.author === currentFilter);
            h += filtered.map((s, i) => {
                const canManage = currentUser && (!s.createdBy || s.createdBy === currentUser.uid);
                return `<div class="${tilts[i%4]} cursor-pointer" onclick="openStory('${s.id}')"><div class="p-6 sketch-border h-full flex flex-col items-center shadow-md bg-white/90" style="background:${cardColors[i%5]}ee; color:#333;">${canManage ? `<div class="action-buttons"><div class="btn-icon" onclick="startEditStory(event, '${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#3182ce;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div><div class="btn-icon" onclick="deleteItem(event, 'stories', '${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#e53e3e;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div></div>` : ''}${s.doodle ? `<div class="doodle-sticker"><img src="${s.doodle}" class="w-full h-full object-cover"></div>` : ''}<h3 class="text-3xl handwritten font-bold text-center" style="color: var(--pencil-gray);">${s.title}</h3><p class="text-lg opacity-70" style="color: var(--pencil-gray);">מאת: ${s.author}</p><div class="w-10 h-0.5 bg-black/5 my-4"></div><p class="handwritten text-xl opacity-50" style="color: var(--pencil-gray);">לחיצה לקריאה</p></div></div>`;
            }).join('');
            h += `<div class="p-8 sketch-border border-dashed flex flex-col items-center justify-center min-h-[180px] cursor-pointer opacity-50" onclick="openAddModal()"><div class="text-5xl">+</div><div class="handwritten text-2xl" style="color: var(--pencil-gray);">קטע חדש</div></div></div>`;
            el.innerHTML = h;
        }

        function renderI(el) {
            let h = `<div class="grid grid-cols-1 md:grid-cols-3 gap-10">` + illustrationsData.map((ill, i) => {
                const canManage = currentUser && (!ill.createdBy || ill.createdBy === currentUser.uid);
                return `<div class="p-4 bg-white sketch-border shadow-xl ${tilts[i%4]}" style="color:#333;">${canManage ? `<div class="action-buttons"><div class="btn-icon" onclick="startEditIllus(event, '${ill.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#3182ce;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div><div class="btn-icon" onclick="deleteItem(event, 'illustrations', '${ill.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#e53e3e;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div></div>` : ''}<img src="${ill.photo}" class="illustration-card-img mb-2"><p class="handwritten text-3xl text-center font-bold" style="color: #333;">${ill.title}</p></div>`;
            }).join('');
            h += `<div class="p-8 sketch-border border-dashed flex flex-col items-center justify-center min-h-[250px] cursor-pointer bg-white/10 opacity-50" onclick="openAddModal()"><div class="text-6xl">+</div><div class="handwritten text-4xl" style="color: var(--pencil-gray);">הוספת איור</div></div></div>`;
            el.innerHTML = h;
        }

        function renderP(el) {
            let h = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6">` + participantsData.map((p, i) => {
                const canManage = currentUser && (!p.createdBy || p.createdBy === currentUser.uid);
                return `<div class="p-4 bg-white sketch-border text-center ${tilts[i%4]} shadow-lg" style="color:#333;">${canManage ? `<div class="action-buttons"><div class="btn-icon" onclick="startEditPart(event, '${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#3182ce;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div><div class="btn-icon" onclick="deleteItem(event, 'participants', '${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#e53e3e;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div></div>` : ''}<img src="${p.photo || 'https://via.placeholder.com/150'}" class="participant-image shadow-inner"><h3 class="text-xl md:text-2xl handwritten font-bold" style="color: #333;">${p.fullName || 'ללא שם'}</h3></div>`;
            }).join('');
            h += `<div class="p-6 sketch-border border-dashed flex flex-col items-center justify-center min-h-[180px] cursor-pointer bg-white/10 opacity-50" onclick="openAddModal()"><div class="text-5xl">+</div><div class="handwritten text-xl" style="color: var(--pencil-gray);">הצטרפות</div></div></div>`;
            el.innerHTML = h;
        }

        window.setFilter = a => { currentFilter = a; renderUI(); };
        window.onload = () => setView('writing');
    </script>
</head>
<body class="view-writing p-4 pb-32">

    <div class="background-doodles">
        <svg class="doodle doodle-heart" style="top: 15%; left: 10%;" viewBox="0 0 50 50"><path d="M25 45 C15 35 5 25 5 15 C5 5 15 5 25 15 C35 5 45 5 45 15 C45 25 35 35 25 45" /></svg>
        <svg class="doodle doodle-heart filled" style="top: 30%; left: 15%; transform: rotate(-25deg);" viewBox="0 0 50 50"><path d="M25 45 C15 35 5 25 5 15 C5 5 15 5 25 15 C35 5 45 5 45 15 C45 25 35 35 25 45" /></svg>
        <svg class="doodle doodle-heart filled" style="bottom: 40%; right: 25%; transform: rotate(15deg);" viewBox="0 0 50 50"><path d="M25 45 C15 35 5 25 5 15 C5 5 15 5 25 15 C35 5 45 5 45 15 C45 25 35 35 25 45" /></svg>
        <svg class="doodle doodle-heart" style="bottom: 20%; left: 30%; transform: rotate(10deg);" viewBox="0 0 50 50"><path d="M25 45 C15 35 5 25 5 15 C5 5 15 5 25 15 C35 5 45 5 45 15 C45 25 35 35 25 45" /></svg>
        <svg class="doodle doodle-heart filled" style="top: 5%; right: 40%; transform: rotate(10deg);" viewBox="0 0 50 50"><path d="M25 45 C15 35 5 25 5 15 C5 5 15 5 25 15 C35 5 45 5 45 15 C45 25 35 35 25 45" /></svg>
        <svg class="doodle doodle-heart filled" style="bottom: 5%; right: 45%; transform: rotate(-15deg);" viewBox="0 0 50 50"><path d="M25 45 C15 35 5 25 5 15 C5 5 15 5 25 15 C35 5 45 5 45 15 C45 25 35 35 25 45" /></svg>
    </div>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    <nav id="sidebar" class="sidebar">
        <button class="text-3xl handwritten mb-10" onclick="toggleSidebar()">✖ סגירה</button>
        <div class="flex flex-col gap-6">
            <div class="nav-item handwritten text-4xl" onclick="setView('writing')">✎ קטעי כתיבה</div>
            <div class="nav-item handwritten text-4xl" onclick="setView('illustrations')">🎨 האיורים של איוי</div>
            <div class="nav-item handwritten text-4xl" onclick="setView('portfolio')">👥 החברים מהסדנה</div>
        </div>
    </nav>

    <button onclick="toggleSidebar()" class="fixed top-4 right-4 z-50 p-3 bg-white/80 sketch-border shadow-md">
        <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
    </button>

    <header class="text-center mb-10 pt-14 px-4">
        <div class="header-content flex flex-col items-center">
            <div class="main-title-area flex items-center justify-center gap-8 mb-6">
                <h1 class="text-5xl md:text-8xl handwritten font-bold leading-tight" style="color: var(--pencil-gray);">כתיבה חמישי ערב</h1>
                <svg class="w-24 h-24 md:w-36 md:h-36 opacity-80" viewBox="0 0 100 100" fill="none" stroke="currentColor" style="color: var(--pencil-gray);">
                    <path d="M30 20 C 35 15, 80 15, 85 20 L 85 85 C 80 90, 35 90, 30 85 Z" stroke-width="2.5"/>
                    <path d="M38 35 L 78 35 M 38 45 L 78 45 M 38 55 L 78 55 M 38 65 L 78 65 M 38 75 L 78 75" stroke-width="1.2" opacity="0.5" />
                    <path d="M28 25 Q 20 25, 20 28 Q 20 31, 28 31" stroke-width="2.2"/>
                    <path d="M28 45 Q 20 45, 20 48 Q 20 51, 28 51" stroke-width="2.2"/>
                    <path d="M28 65 Q 20 65, 20 68 Q 20 71, 28 71" stroke-width="2.2"/>
                    <path d="M15 85 L 5 45 L 12 45 L 20 85 Z" stroke-width="2.2"/>
                    <path d="M5 45 L 8.5 35 L 12 45" stroke-width="2.5"/>
                </svg>
            </div>
            
            <div class="flex items-center justify-center gap-10">
                <div id="viewIcons" class="flex items-center justify-center"></div>
                <h2 class="text-6xl md:text-8xl handwritten" style="color: var(--pencil-gray);"><span id="sectionTitle" class="marker-highlight"></span></h2>
            </div>
        </div>
    </header>

    <main id="mainContent" class="max-w-6xl mx-auto px-2"></main>

    <button id="fab" onclick="openAddModal()" class="fixed bottom-6 right-6 w-16 h-16 text-white rounded-full flex items-center justify-center text-4xl z-50 shadow-2xl" style="background: #7a9eb5; border: 2px solid white;">+</button>

    <!-- Reading View -->
    <div id="viewModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup max-w-4xl">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <div class="flex flex-col md:flex-row items-center gap-10 mt-8">
                <div id="mDoodleContainer" class="w-full md:w-1/3 hidden"></div>
                <div class="w-full md:w-2/3 text-center md:text-right">
                    <h2 id="mTitle" class="text-4xl md:text-6xl handwritten font-bold mb-2" style="color: var(--pencil-gray);"></h2>
                    <p id="mAuthor" class="text-2xl opacity-60 mb-8" style="color: var(--pencil-gray);"></p>
                    <div id="mText" class="sketch-border p-8 bg-white text-right text-2xl kalam whitespace-pre-wrap shadow-inner leading-relaxed" style="color: #333;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Writing Modal -->
    <div id="addModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <form onsubmit="hSaveStory(event)" class="flex flex-col mt-6">
                <h2 class="text-4xl handwritten font-bold text-center" style="color: var(--pencil-gray);">הוספה / עריכה</h2>
                <input id="t" required placeholder="כותרת היצירה">
                <input id="a" required placeholder="שם הכותב.ת">
                <textarea id="c" rows="6" required placeholder="כאן כותבים..."></textarea>
                <div class="flex flex-col gap-1 mb-4">
                    <label class="text-sm font-bold opacity-60" style="color: var(--pencil-gray);">איור מלווה (אופציונלי):</label>
                    <input type="file" id="sd" accept="image/*">
                </div>
                <button id="sb" type="submit" class="bg-[#7a9eb5] text-white py-4 rounded-2xl text-3xl handwritten hover:bg-[#688a9e]">פרסום</button>
            </form>
        </div>
    </div>

    <!-- Illustration Modal -->
    <div id="addIllusModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <form onsubmit="hSaveIllus(event)" class="flex flex-col mt-6">
                <h2 class="text-4xl handwritten font-bold text-center" style="color: var(--pencil-gray);">איור חדש</h2>
                <input id="it" required placeholder="כותרת האיור">
                <div class="flex flex-col gap-1 mb-4">
                    <label class="text-sm font-bold opacity-60" style="color: var(--pencil-gray);">תמונת האיור:</label>
                    <input type="file" id="ip" accept="image/*">
                </div>
                <button id="ib" type="submit" class="bg-[#7a9eb5] text-white py-4 rounded-2xl text-3xl handwritten hover:bg-[#688a9e]">שמירה</button>
            </form>
        </div>
    </div>

    <!-- Member Modal -->
    <div id="addPartModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <form onsubmit="hSavePart(event)" class="flex flex-col mt-6">
                <h2 class="text-4xl handwritten font-bold text-center" style="color: var(--pencil-gray);">הצטרפות לסדנה</h2>
                <input id="fullName" required placeholder="שם מלא">
                <div class="flex flex-col gap-1 mb-4">
                    <label class="text-sm font-bold opacity-60" style="color: var(--pencil-gray);">תמונת פרופיל:</label>
                    <input type="file" id="pp" accept="image/*">
                </div>
                <button id="pb" type="submit" class="bg-[#7a9eb5] text-white py-4 rounded-2xl text-3xl handwritten hover:bg-[#688a9e]">הוספה</button>
            </form>
        </div>
    </div>
</body>
</html>
