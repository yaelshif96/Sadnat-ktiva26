<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>כתיבה חמישי ערב - המרחב השיתופי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Amatic+SC:wght@400;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- עיצוב מקיף ---
        const style = document.createElement('style');
        style.textContent = `
            :root { --main-bg: #fde2e4; --pencil-gray: #7a9eb5; --marker-color: #fff3b0; }
            html { scroll-behavior: smooth; overflow-x: hidden; }
            body { font-family: 'Assistant', sans-serif; background-color: var(--main-bg); color: var(--pencil-gray); margin: 0; min-height: 100vh; overflow-x: hidden; transition: background-color 0.8s ease; background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png"); -webkit-overflow-scrolling: touch; }
            
            body.view-writing { --main-bg: #fde2e4; --pencil-gray: #7a9eb5; --marker-color: #fff3b0; }
            body.view-illustrations { --main-bg: #e6f7e9; --pencil-gray: #4a7c59; --marker-color: #ffd1dc; }
            body.view-portfolio { --main-bg: #2b50d8; --pencil-gray: #ffffff; --marker-color: #c1fba4; }
            
            body.view-illustrations .main-title-area, body.view-portfolio .main-title-area { display: none; }
            
            .handwritten { font-family: 'Amatic SC', cursive; }
            .kalam { font-family: 'Kalam', cursive; }
            .sketch-border { border: 2px solid var(--pencil-gray); border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; position: relative; }
            
            /* מנגנון פופ-אפ משופר - Glassmorphism */
            .modal { 
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                z-index: 99999; padding: 1.5rem; 
                align-items: center; justify-content: center;
            }
            .modal.active { display: flex !important; }
            
            .modal-overlay { 
                position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); z-index: -1; 
            }
            
            .modal-popup { 
                background: rgba(255, 255, 255, 0.92) !important; 
                backdrop-filter: blur(15px);
                max-width: 520px; 
                width: 100%; 
                border-radius: 35px; 
                box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4); 
                padding: 2.5rem; 
                position: relative; 
                border: 1px solid rgba(255,255,255,0.6);
                color: #1a202c !important;
                max-height: 88vh;
                overflow-y: auto;
                animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            @keyframes popIn {
                from { transform: scale(0.85); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }
            
            .close-btn {
                position: absolute; top: 1.2rem; left: 1.2rem;
                width: 42px; height: 42px; border-radius: 50%;
                background: white; display: flex; align-items: center; justify-content: center;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; border: none;
                font-size: 1.4rem; color: #2d3748; z-index: 100; transition: transform 0.2s, background 0.2s;
            }
            .close-btn:hover { transform: scale(1.1); background: #f1f5f9; }

            .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: white; z-index: 9999; transition: right 0.4s ease; border-left: 2px solid var(--pencil-gray); padding: 2rem; color: #333 !important; }
            .sidebar.active { right: 0; }
            .sidebar .nav-item { color: #333 !important; cursor: pointer; margin-bottom: 1.8rem; font-size: 2.4rem; }
            
            .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 9990; }
            .overlay.active { display: block; }
            
            .marker-highlight { background-color: var(--marker-color); padding: 2px 10px; display: inline-block; transform: rotate(-1.5deg); border-radius: 4px; color: #333 !important; }
            
            input, textarea { background: rgba(255,255,255,0.95); border: 2px solid #e2e8f0; border-radius: 16px; padding: 16px; font-size: 16px !important; width: 100%; color: #1a202c; margin-bottom: 1.4rem; transition: border-color 0.2s; }
            input:focus, textarea:focus { border-color: #7a9eb5; outline: none; }
            
            .illustration-card-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; background: #fff; border-radius: 12px; }
            .participant-image { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px dashed var(--pencil-gray); margin: 0 auto 1.5rem; background: white; }
            
            .doodle-sticker { position: absolute; bottom: -12px; left: -12px; width: 65px; height: 65px; background: white; padding: 4px; transform: rotate(-8deg); box-shadow: 3px 3px 12px rgba(0,0,0,0.2); border: 1px solid #eee; z-index: 5; border-radius: 6px; }
            .doodle-sticker img { width: 100%; height: 100%; object-fit: cover; }

            .action-buttons { position: absolute; top: 12px; left: 12px; display: flex; gap: 10px; z-index: 20; opacity: 0; transition: opacity 0.3s; }
            .sketch-border:hover .action-buttons { opacity: 1; }
            .btn-icon { background: white; border-radius: 50%; padding: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); cursor: pointer; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }

            .no-scrollbar::-webkit-scrollbar { display: none; }
            @media (max-width: 768px) { 
                .header-content h1 { font-size: 3.2rem !important; } 
                .header-content h2 { font-size: 1.6rem !important; }
                .action-buttons { opacity: 0.9; }
                .modal-popup { padding: 2.5rem 1.5rem; width: 94%; }
            }
        `;
        document.head.appendChild(style);

        // --- אתחול Firebase ---
        let db, auth, currentUser;
        const appId = 'workshop-site-v3';

        const firebaseConfig = {
            apiKey: "AIzaSyDBR2ds88xpHctIRolKjfxObCpFEtgjJDc",
            authDomain: "sadnat-ktiva-26.firebaseapp.com",
            projectId: "sadnat-ktiva-26",
            storageBucket: "sadnat-ktiva-26.firebasestorage.app",
            messagingSenderId: "468181605477",
            appId: "1:468181605477:web:23be0e2e4402eb4842fa8c",
            measurementId: "G-ECZVXSLBQ3"
        };

        const initFirebase = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    setupListener('stories', d => { workshopData = d; if(activeView==='writing') renderUI(); });
                    setupListener('participants', d => { participantsData = d; if(activeView==='portfolio') renderUI(); });
                    setupListener('illustrations', d => { illustrationsData = d; if(activeView==='illustrations') renderUI(); });
                }
            });
        };

        initFirebase();

        // --- משתני המערכת ---
        let workshopData = [], participantsData = [], illustrationsData = [], activeView = 'writing', currentFilter = 'הכל';
        let editingId = null;

        const cardColors = ['#e2eafc', '#fef9ff', '#d8f3dc', '#fefae0', '#f7d9da'];
        const tilts = ['rotate-[-1deg]', 'rotate-[1deg]', 'rotate-[-1.5deg]', 'rotate-[1.5deg]'];

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.setView = (v) => {
            activeView = v;
            document.body.className = `view-${v} p-4 pb-32`;
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            renderUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.closeModal = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.body.style.overflow = '';
            editingId = null;
        };

        window.openStory = (id) => {
            const s = workshopData.find(x => x.id === id);
            if(!s) return;
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mAuthor').innerText = "מאת: " + s.author;
            document.getElementById('mText').innerText = s.content;
            
            const doodleContainer = document.getElementById('mDoodleContainer');
            if (s.doodle) {
                doodleContainer.innerHTML = `<img src="${s.doodle}" class="max-w-full rounded-2xl shadow-xl mb-6 border-4 border-white">`;
                doodleContainer.classList.remove('hidden');
            } else {
                doodleContainer.innerHTML = '';
                doodleContainer.classList.add('hidden');
            }
            document.getElementById('viewModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.openAddModal = () => {
            editingId = null;
            const mId = activeView === 'writing' ? 'addModal' : activeView === 'portfolio' ? 'addPartModal' : 'addIllusModal';
            document.getElementById(mId).classList.add('active');
            document.body.style.overflow = 'hidden';
            
            if (activeView === 'writing') {
                document.getElementById('t').value = ''; document.getElementById('a').value = ''; document.getElementById('c').value = '';
                document.getElementById('sb').innerText = 'פרסום';
            } else if (activeView === 'portfolio') {
                document.getElementById('fullName').value = ''; document.getElementById('pb').innerText = 'הוספה';
            } else if (activeView === 'illustrations') {
                document.getElementById('it').value = ''; document.getElementById('ib').innerText = 'שמירה';
            }
        };

        window.startEditStory = (e, id) => {
            e.stopPropagation();
            const s = workshopData.find(x => x.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('t').value = s.title;
            document.getElementById('a').value = s.author;
            document.getElementById('c').value = s.content;
            document.getElementById('sb').innerText = 'עדכון';
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.startEditIllus = (e, id) => {
            e.stopPropagation();
            const ill = illustrationsData.find(x => x.id === id);
            if (!ill) return;
            editingId = id;
            document.getElementById('it').value = ill.title;
            document.getElementById('ib').innerText = 'עדכון';
            document.getElementById('addIllusModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.startEditPart = (e, id) => {
            e.stopPropagation();
            const p = participantsData.find(x => x.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('fullName').value = p.fullName || `${p.firstName} ${p.lastName}`;
            document.getElementById('pb').innerText = 'עדכון';
            document.getElementById('addPartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.deleteItem = async (e, colName, id) => {
            e.stopPropagation();
            if (!confirm("בטוח.ה שברצונך למחוק?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id));
            } catch (err) { alert(err.message); }
        };

        async function save(col, data, btnId) {
            if(!db || !currentUser) return;
            const btn = document.getElementById(btnId);
            btn.disabled = true; const originalText = btn.innerText; btn.innerText = 'שומר.ת...';
            try {
                if (editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', col, editingId), { ...data, updatedAt: Date.now() });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), { ...data, timestamp: Date.now(), createdBy: currentUser.uid });
                }
                closeModal();
            } catch (e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerText = originalText; }
        }

        async function toBase64(file) {
            if(!file) return null;
            return new Promise(r => { const rd = new FileReader(); rd.onload = e => r(rd.result); rd.readAsDataURL(file); });
        }

        window.hSaveStory = async e => { e.preventDefault(); const doodleBase = await toBase64(document.getElementById('sd').files[0]); const data = { title: document.getElementById('t').value, author: document.getElementById('a').value, content: document.getElementById('c').value }; if (doodleBase) data.doodle = doodleBase; save('stories', data, 'sb'); };
        window.hSavePart = async e => { e.preventDefault(); const pBase = await toBase64(document.getElementById('pp').files[0]); const data = { fullName: document.getElementById('fullName').value }; if(pBase) data.photo = pBase; save('participants', data, 'pb'); };
        window.hSaveIllus = async e => { e.preventDefault(); const pBase = await toBase64(document.getElementById('ip').files[0]); const data = { title: document.getElementById('it').value }; if(pBase) data.photo = pBase; save('illustrations', data, 'ib'); };

        function setupListener(col, cb) {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', col), s => {
                cb(s.docs.map(x => ({ id: x.id, ...x.data() })).sort((a,b) => b.timestamp - a.timestamp));
            });
        }

        function renderUI() {
            const main = document.getElementById('mainContent');
            if(activeView === 'writing') renderW(main);
            else if(activeView === 'illustrations') renderI(main);
            else renderP(main);
            document.getElementById('sectionTitle').innerText = activeView === 'writing' ? 'המגזימים עם הכיבוד' : activeView === 'illustrations' ? 'האיורים של איוי' : 'החברים מהסדנה';
        }

        function renderW(el) {
            const authors = ['הכל', ...new Set(workshopData.map(s => s.author))];
            let h = `<div class="flex overflow-x-auto gap-3 mb-8 pb-2 no-scrollbar">` + authors.map(a => `<button onclick="setFilter('${a}')" class="px-6 py-2 rounded-full handwritten text-2xl ${currentFilter===a?'bg-white text-black shadow-md':'bg-white/30 text-white'}">${a}</button>`).join('') + `</div><div class="grid grid-cols-1 md:grid-cols-3 gap-8">`;
            const filtered = currentFilter === 'הכל' ? workshopData : workshopData.filter(s => s.author === currentFilter);
            h += filtered.map((s, i) => {
                const canManage = currentUser && (!s.createdBy || s.createdBy === currentUser.uid);
                return `<div class="${tilts[i%4]} cursor-pointer" onclick="openStory('${s.id}')"><div class="p-6 sketch-border h-full flex flex-col items-center shadow-md bg-white/90" style="background:${cardColors[i%5]}ee; color:#333;">${canManage ? `<div class="action-buttons"><div class="btn-icon" onclick="startEditStory(event, '${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#3182ce;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div><div class="btn-icon" onclick="deleteItem(event, 'stories', '${s.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#e53e3e;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div></div>` : ''}${s.doodle ? `<div class="doodle-sticker"><img src="${s.doodle}"></div>` : ''}<h3 class="text-3xl handwritten font-bold text-center">${s.title}</h3><p class="text-lg opacity-70">מאת: ${s.author}</p><div class="w-10 h-0.5 bg-black/5 my-4"></div><p class="handwritten text-xl opacity-50">לחיצה לקריאה</p></div></div>`;
            }).join('');
            h += `<div class="p-8 sketch-border border-dashed flex flex-col items-center justify-center min-h-[180px] cursor-pointer opacity-50" onclick="openAddModal()"><div class="text-5xl">+</div><div class="handwritten text-2xl">קטע חדש</div></div></div>`;
            el.innerHTML = h;
        }

        function renderI(el) {
            let h = `<div class="grid grid-cols-1 md:grid-cols-3 gap-10">` + illustrationsData.map((ill, i) => {
                const canManage = currentUser && (!ill.createdBy || ill.createdBy === currentUser.uid);
                return `<div class="p-4 bg-white sketch-border shadow-xl ${tilts[i%4]}" style="color:#333;">${canManage ? `<div class="action-buttons"><div class="btn-icon" onclick="startEditIllus(event, '${ill.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#3182ce;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div><div class="btn-icon" onclick="deleteItem(event, 'illustrations', '${ill.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#e53e3e;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div></div>` : ''}<img src="${ill.photo}" class="illustration-card-img mb-2"><p class="handwritten text-3xl text-center font-bold">${ill.title}</p></div>`;
            }).join('');
            h += `<div class="p-8 sketch-border border-dashed flex flex-col items-center justify-center min-h-[250px] cursor-pointer bg-white/10 opacity-50" onclick="openAddModal()"><div class="text-6xl">+</div><div class="handwritten text-4xl">הוספת איור</div></div></div>`;
            el.innerHTML = h;
        }

        function renderP(el) {
            let h = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6">` + participantsData.map((p, i) => {
                const canManage = currentUser && (!p.createdBy || p.createdBy === currentUser.uid);
                return `<div class="p-4 bg-white sketch-border text-center ${tilts[i%4]} shadow-lg" style="color:#333;">${canManage ? `<div class="action-buttons"><div class="btn-icon" onclick="startEditPart(event, '${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#3182ce;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div><div class="btn-icon" onclick="deleteItem(event, 'participants', '${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#e53e3e;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div></div>` : ''}<img src="${p.photo || 'https://via.placeholder.com/150'}" class="participant-image shadow-inner"><h3 class="text-xl md:text-2xl handwritten font-bold">${p.fullName || 'ללא שם'}</h3></div>`;
            }).join('');
            h += `<div class="p-6 sketch-border border-dashed flex flex-col items-center justify-center min-h-[180px] cursor-pointer bg-white/10 opacity-50" onclick="openAddModal()"><div class="text-5xl">+</div><div class="handwritten text-xl">הצטרפות</div></div></div>`;
            el.innerHTML = h;
        }

        window.setFilter = a => { currentFilter = a; renderUI(); };
        window.onload = () => setView('writing');
    </script>
</head>
<body class="view-writing p-4 pb-32">
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    <nav id="sidebar" class="sidebar">
        <button class="text-3xl handwritten mb-10" onclick="toggleSidebar()">✖ סגירה</button>
        <div class="flex flex-col gap-6">
            <div class="nav-item handwritten text-4xl" onclick="setView('writing')">✎ קטעי כתיבה</div>
            <div class="nav-item handwritten text-4xl" onclick="setView('illustrations')">🎨 האיורים של איוי</div>
            <div class="nav-item handwritten text-4xl" onclick="setView('portfolio')">👥 החברים מהסדנה</div>
        </div>
    </nav>

    <button onclick="toggleSidebar()" class="fixed top-4 right-4 z-50 p-3 bg-white/80 sketch-border shadow-md">
        <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
    </button>

    <header class="text-center mb-10 pt-14">
        <div class="main-title-area flex items-center justify-center gap-4 mb-4">
            <h1 class="text-5xl md:text-8xl handwritten font-bold leading-tight">כתיבה חמישי ערב</h1>
            <svg class="w-10 h-10 opacity-30" viewBox="0 0 100 100" fill="none" stroke="currentColor">
                <path d="M30 20 C 32 18, 75 18, 78 20 L 78 80 C 75 82, 32 82, 30 80 Z" /><path d="M28 25 Q 24 25, 24 28 Q 24 31, 28 31" /><path d="M82 60 L 88 35 L 92 38 L 86 63 L 82 60" />
            </svg>
        </div>
        <h2 class="text-2xl md:text-4xl handwritten"><span id="sectionTitle" class="marker-highlight"></span></h2>
    </header>

    <main id="mainContent" class="max-w-6xl mx-auto px-2"></main>

    <button id="fab" onclick="openAddModal()" class="fixed bottom-6 right-6 w-16 h-16 text-white rounded-full flex items-center justify-center text-4xl z-50 shadow-2xl" style="background: #7a9eb5; border: 2px solid white;">+</button>

    <!-- פופ-אפ קריאת קטע -->
    <div id="viewModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup max-w-4xl">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <div class="flex flex-col md:flex-row items-center gap-10 mt-8">
                <div id="mDoodleContainer" class="w-full md:w-1/3 hidden"></div>
                <div class="w-full md:w-2/3 text-center md:text-right">
                    <h2 id="mTitle" class="text-4xl md:text-6xl handwritten font-bold mb-2"></h2>
                    <p id="mAuthor" class="text-2xl opacity-60 mb-8"></p>
                    <div id="mText" class="sketch-border p-8 bg-white text-right text-2xl kalam whitespace-pre-wrap shadow-inner leading-relaxed"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- פופ-אפ הוספת כתיבה -->
    <div id="addModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <form onsubmit="hSaveStory(event)" class="flex flex-col mt-6">
                <h2 class="text-4xl handwritten font-bold text-center">הוספה / עריכה</h2>
                <input id="t" required placeholder="כותרת היצירה">
                <input id="a" required placeholder="שם הכותב.ת">
                <textarea id="c" rows="6" required placeholder="כאן כותבים..."></textarea>
                <div class="flex flex-col gap-1 mb-4">
                    <label class="text-sm font-bold opacity-70">איור מלווה (אופציונלי):</label>
                    <input type="file" id="sd" accept="image/*">
                </div>
                <button id="sb" type="submit" class="bg-blue-600 text-white py-4 rounded-2xl text-3xl handwritten hover:bg-blue-700">פרסום</button>
            </form>
        </div>
    </div>

    <!-- פופ-אפ הוספת איור -->
    <div id="addIllusModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <form onsubmit="hSaveIllus(event)" class="flex flex-col mt-6">
                <h2 class="text-4xl handwritten font-bold text-center">איור חדש</h2>
                <input id="it" required placeholder="כותרת האיור">
                <div class="flex flex-col gap-1 mb-4">
                    <label class="text-sm font-bold opacity-70">תמונת האיור:</label>
                    <input type="file" id="ip" accept="image/*">
                </div>
                <button id="ib" type="submit" class="bg-blue-600 text-white py-4 rounded-2xl text-3xl handwritten hover:bg-blue-700">שמירה</button>
            </form>
        </div>
    </div>

    <!-- פופ-אפ הצטרפות -->
    <div id="addPartModal" class="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-popup">
            <button class="close-btn" onclick="closeModal()">✖</button>
            <form onsubmit="hSavePart(event)" class="flex flex-col mt-6">
                <h2 class="text-4xl handwritten font-bold text-center">הצטרפות לסדנה</h2>
                <input id="fullName" required placeholder="שם מלא">
                <div class="flex flex-col gap-1 mb-4">
                    <label class="text-sm font-bold opacity-70">תמונת פרופיל:</label>
                    <input type="file" id="pp" accept="image/*">
                </div>
                <button id="pb" type="submit" class="bg-blue-600 text-white py-4 rounded-2xl text-3xl handwritten hover:bg-blue-700">הוספה</button>
            </form>
        </div>
    </div>
</body>
</html>
