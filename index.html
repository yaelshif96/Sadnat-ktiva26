<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>כתיבה חמישי ערב - המרחב השיתופי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Amatic+SC:wght@400;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- עיצוב ---
        const style = document.createElement('style');
        style.textContent = `
            :root { --main-bg: #fde2e4; --pencil-gray: #7a9eb5; --marker-color: #fff3b0; }
            html { scroll-behavior: smooth; overflow-x: hidden; }
            body { font-family: 'Assistant', sans-serif; background-color: var(--main-bg); color: var(--pencil-gray); margin: 0; min-height: 100vh; overflow-x: hidden; transition: background-color 0.8s ease; background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png"); -webkit-overflow-scrolling: touch; }
            body.view-writing { --main-bg: #fde2e4; --pencil-gray: #7a9eb5; --marker-color: #fff3b0; }
            body.view-illustrations { --main-bg: #e6f7e9; --pencil-gray: #4a7c59; --marker-color: #ffd1dc; }
            body.view-portfolio { --main-bg: #2b50d8; --pencil-gray: #ffffff; --marker-color: #c1fba4; }
            body.view-illustrations .main-title-area, body.view-portfolio .main-title-area { display: none; }
            .handwritten { font-family: 'Amatic SC', cursive; }
            .kalam { font-family: 'Kalam', cursive; }
            .sketch-border { border: 2px solid var(--pencil-gray); border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; position: relative; }
            .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); z-index: 5000; overflow-y: auto; padding: 1rem; }
            .modal.active { display: flex; flex-direction: column; align-items: center; }
            .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: white; z-index: 6000; transition: right 0.4s ease; border-left: 2px solid var(--pencil-gray); padding: 2rem; color: #333 !important; }
            .sidebar.active { right: 0; }
            .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 5500; }
            .overlay.active { display: block; }
            .marker-highlight { background-color: var(--marker-color); padding: 2px 10px; display: inline-block; transform: rotate(-1.5deg); border-radius: 4px; color: #333 !important; }
            input, textarea { background: rgba(255,255,255,0.7); border: 1px solid var(--pencil-gray); border-radius: 8px; padding: 12px; font-size: 16px !important; width: 100%; color: #333; }
            .illustration-card-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; background: #fff; border-radius: 8px; }
            .participant-image { width: 110px; height: 110px; object-fit: cover; border-radius: 50%; border: 3px dashed var(--pencil-gray); margin: 0 auto 1rem; }
            
            /* כפתורי עריכה ומחיקה */
            .action-buttons { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px; z-index: 20; opacity: 0.2; transition: opacity 0.3s; }
            .sketch-border:hover .action-buttons { opacity: 1; }
            .btn-icon { background: white; border-radius: 50%; padding: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; border: 1px solid #ddd; }
            .btn-icon:hover { transform: scale(1.1); }
            .btn-icon svg { width: 14px; height: 14px; }
            .delete-btn { color: #e53e3e; }
            .edit-btn { color: #3182ce; }

            .no-scrollbar::-webkit-scrollbar { display: none; }
            @media (max-width: 768px) { 
                .header-content h1 { font-size: 3.2rem !important; } 
                .header-content h2 { font-size: 1.6rem !important; }
                .action-buttons { opacity: 0.8; } /* במובייל תמיד נראה קצת */
            }
        `;
        document.head.appendChild(style);

        // --- אתחול המחסן (Firebase) ---
        let db, auth, currentUser;
        const appId = 'workshop-site-v3';

        const firebaseConfig = {
            apiKey: "AIzaSyDBR2ds88xpHctIRolKjfxObCpFEtgjJDc",
            authDomain: "sadnat-ktiva-26.firebaseapp.com",
            projectId: "sadnat-ktiva-26",
            storageBucket: "sadnat-ktiva-26.firebasestorage.app",
            messagingSenderId: "468181605477",
            appId: "1:468181605477:web:23be0e2e4402eb4842fa8c",
            measurementId: "G-ECZVXSLBQ3"
        };

        const initFirebase = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    setupListener('stories', d => { workshopData = d; if(activeView==='writing') renderUI(); });
                    setupListener('participants', d => { participantsData = d; if(activeView==='portfolio') renderUI(); });
                    setupListener('illustrations', d => { illustrationsData = d; if(activeView==='illustrations') renderUI(); });
                }
            });
        };

        initFirebase();

        // --- לוגיקה של האתר ---
        let workshopData = [], participantsData = [], illustrationsData = [], activeView = 'writing', currentFilter = 'הכל';
        let editingId = null; // משתנה למעקב אחרי עריכה

        const cardColors = ['#e2eafc', '#fef9ff', '#d8f3dc', '#fefae0', '#f7d9da'];
        const tilts = ['rotate-[-1deg]', 'rotate-[1deg]', 'rotate-[-1.5deg]', 'rotate-[1.5deg]'];

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.setView = (v) => {
            activeView = v;
            document.body.className = `view-${v} p-4 pb-32`;
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
            renderUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.closeModal = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.body.style.overflow = '';
            editingId = null; // איפוס מזהה עריכה
        };

        window.openStory = (id) => {
            const s = workshopData.find(x => x.id === id);
            if(!s) return;
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mAuthor').innerText = "מאת: " + s.author;
            document.getElementById('mText').innerText = s.content;
            document.getElementById('viewModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.openAddModal = () => {
            const mId = activeView === 'writing' ? 'addModal' : activeView === 'portfolio' ? 'addPartModal' : 'addIllusModal';
            document.getElementById(mId).classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // איפוס טפסים ושינוי טקסט כפתור
            if (activeView === 'writing') {
                document.getElementById('t').value = '';
                document.getElementById('a').value = '';
                document.getElementById('c').value = '';
                document.getElementById('sb').innerText = 'פרסום';
            }
        };

        // פונקציות עריכה
        window.startEditStory = (e, id) => {
            e.stopPropagation();
            const s = workshopData.find(x => x.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('t').value = s.title;
            document.getElementById('a').value = s.author;
            document.getElementById('c').value = s.content;
            document.getElementById('sb').innerText = 'עדכון';
            document.getElementById('addModal').classList.add('active');
        };

        window.deleteItem = async (e, colName, id) => {
            e.stopPropagation();
            if (!confirm("בטוח.ה שברצונך למחוק? פעולה זו אינה ניתנת לביטול.")) return;
            try {
                const itemRef = doc(db, 'artifacts', appId, 'public', 'data', colName, id);
                await deleteDoc(itemRef);
            } catch (err) { alert("שגיאה במחיקה: " + err.message); }
        };

        async function save(col, data, btnId) {
            if(!db || !currentUser) return;
            const btn = document.getElementById(btnId);
            btn.disabled = true; 
            const originalText = btn.innerText;
            btn.innerText = 'שומר.ת...';
            
            try {
                if (editingId) {
                    // עדכון קיים
                    const itemRef = doc(db, 'artifacts', appId, 'public', 'data', col, editingId);
                    await updateDoc(itemRef, { ...data, updatedAt: Date.now() });
                } else {
                    // יצירת חדש
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), { 
                        ...data, 
                        timestamp: Date.now(),
                        createdBy: currentUser.uid // שמירת מזהה היוצר
                    });
                }
                closeModal();
            } catch (e) { alert("שגיאה: " + e.message); }
            finally { btn.disabled = false; btn.innerText = originalText; }
        }

        async function toBase64(file) {
            if(!file) return null;
            return new Promise(r => { const rd = new FileReader(); rd.onload = e => r(rd.result); rd.readAsDataURL(file); });
        }

        window.hSaveStory = e => { e.preventDefault(); save('stories', { title: document.getElementById('t').value, author: document.getElementById('a').value, content: document.getElementById('c').value }, 'sb'); };
        window.hSavePart = async e => { e.preventDefault(); const pFile = document.getElementById('pp').files[0]; const pBase = await toBase64(pFile); const data = { firstName: document.getElementById('f').value, lastName: document.getElementById('l').value }; if(pBase) data.photo = pBase; save('participants', data, 'pb'); };
        window.hSaveIllus = async e => { e.preventDefault(); const pFile = document.getElementById('ip').files[0]; const pBase = await toBase64(pFile); const data = { title: document.getElementById('it').value }; if(pBase) data.photo = pBase; save('illustrations', data, 'ib'); };

        function setupListener(col, cb) {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', col), s => {
                cb(s.docs.map(x => ({ id: x.id, ...x.data() })).sort((a,b) => b.timestamp - a.timestamp));
            });
        }

        // אייקונים
        const trashIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;
        const editIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;

        function renderUI() {
            const title = document.getElementById('sectionTitle');
            const main = document.getElementById('mainContent');
            if(activeView === 'writing') { title.innerText = 'המגזימים עם הכיבוד'; renderW(main); }
            else if(activeView === 'illustrations') { title.innerText = 'האיורים של איוי'; renderI(main); }
            else { title.innerText = 'החברים מהסדנה'; renderP(main); }
        }

        function renderW(el) {
            const authors = ['הכל', ...new Set(workshopData.map(s => s.author))];
            let h = `<div class="flex overflow-x-auto gap-3 mb-8 pb-2 no-scrollbar">` + authors.map(a => `<button onclick="setFilter('${a}')" class="px-6 py-2 rounded-full handwritten text-2xl ${currentFilter===a?'bg-white text-black shadow-md':'bg-white/30 text-white'}">${a}</button>`).join('') + `</div><div class="grid grid-cols-1 md:grid-cols-3 gap-8">`;
            const filtered = currentFilter === 'הכל' ? workshopData : workshopData.filter(s => s.author === currentFilter);
            h += filtered.map((s, i) => {
                const isCreator = currentUser && s.createdBy === currentUser.uid;
                return `
                <div class="${tilts[i%4]} cursor-pointer" onclick="openStory('${s.id}')">
                    <div class="p-6 sketch-border h-full flex flex-col items-center shadow-md bg-white/90" style="background:${cardColors[i%5]}ee; color:#333;">
                        ${isCreator ? `
                        <div class="action-buttons">
                            <div class="btn-icon edit-btn" title="עריכה" onclick="startEditStory(event, '${s.id}')">${editIcon}</div>
                            <div class="btn-icon delete-btn" title="מחיקה" onclick="deleteItem(event, 'stories', '${s.id}')">${trashIcon}</div>
                        </div>` : ''}
                        <h3 class="text-3xl handwritten font-bold text-center">${s.title}</h3>
                        <p class="text-lg opacity-70">מאת: ${s.author}</p>
                        <div class="w-10 h-0.5 bg-black/5 my-4"></div>
                        <p class="handwritten text-xl opacity-50">לחיצה לקריאה</p>
                    </div>
                </div>`;
            }).join('');
            h += `<div class="p-8 sketch-border border-dashed flex flex-col items-center justify-center min-h-[180px] cursor-pointer opacity-50" onclick="openAddModal()"><div class="text-5xl">+</div><div class="handwritten text-2xl">קטע חדש</div></div></div>`;
            el.innerHTML = h;
        }

        function renderI(el) {
            let h = `<div class="grid grid-cols-1 md:grid-cols-3 gap-10">` + illustrationsData.map((ill, i) => {
                const isCreator = currentUser && ill.createdBy === currentUser.uid;
                return `
                <div class="p-4 bg-white sketch-border shadow-xl ${tilts[i%4]}" style="color:#333;">
                    ${isCreator ? `
                    <div class="action-buttons">
                        <div class="btn-icon delete-btn" title="מחיקה" onclick="deleteItem(event, 'illustrations', '${ill.id}')">${trashIcon}</div>
                    </div>` : ''}
                    <img src="${ill.photo}" class="illustration-card-img mb-2">
                    <p class="handwritten text-3xl text-center font-bold">${ill.title}</p>
                </div>`;
            }).join('');
            h += `<div class="p-8 sketch-border border-dashed flex flex-col items-center justify-center min-h-[250px] cursor-pointer bg-white/10 opacity-50" onclick="openAddModal()"><div class="text-6xl">+</div><div class="handwritten text-4xl">הוספת איור</div></div></div>`;
            el.innerHTML = h;
        }

        function renderP(el) {
            let h = `<div class="grid grid-cols-2 md:grid-cols-4 gap-6">` + participantsData.map((p, i) => {
                const isCreator = currentUser && p.createdBy === currentUser.uid;
                return `
                <div class="p-4 bg-white sketch-border text-center ${tilts[i%4]} shadow-lg" style="color:#333;">
                    ${isCreator ? `
                    <div class="action-buttons">
                        <div class="btn-icon delete-btn" title="מחיקה" onclick="deleteItem(event, 'participants', '${p.id}')">${trashIcon}</div>
                    </div>` : ''}
                    <img src="${p.photo || 'https://via.placeholder.com/150'}" class="participant-image">
                    <h3 class="text-xl md:text-2xl handwritten font-bold">${p.firstName} ${p.lastName}</h3>
                </div>`;
            }).join('');
            h += `<div class="p-6 sketch-border border-dashed flex flex-col items-center justify-center min-h-[180px] cursor-pointer bg-white/10 opacity-50" onclick="openAddModal()"><div class="text-5xl">+</div><div class="handwritten text-xl">הצטרפות</div></div></div>`;
            el.innerHTML = h;
        }

        window.setFilter = a => { currentFilter = a; renderUI(); };
        window.onload = () => setView('writing');
    </script>
</head>
<body class="view-writing p-4 pb-32">
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    <nav id="sidebar" class="sidebar">
        <button class="text-3xl handwritten mb-10" onclick="toggleSidebar()">✖ סגירה</button>
        <div class="flex flex-col gap-6">
            <div class="nav-item handwritten text-4xl" onclick="setView('writing')">✎ קטעי כתיבה</div>
            <div class="nav-item handwritten text-4xl" onclick="setView('illustrations')">🎨 האיורים של איוי</div>
            <div class="nav-item handwritten text-4xl" onclick="setView('portfolio')">👥 החברים מהסדנה</div>
        </div>
    </nav>

    <button onclick="toggleSidebar()" class="fixed top-4 right-4 z-50 p-3 bg-white/80 sketch-border shadow-md">
        <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
    </button>

    <header class="text-center mb-10 pt-14">
        <div class="main-title-area flex items-center justify-center gap-4 mb-4">
            <h1 class="text-5xl md:text-8xl handwritten font-bold leading-tight">כתיבה חמישי ערב</h1>
            <svg class="w-10 h-10 opacity-30" viewBox="0 0 100 100" fill="none" stroke="currentColor">
                <path d="M30 20 C 32 18, 75 18, 78 20 L 78 80 C 75 82, 32 82, 30 80 Z" /><path d="M28 25 Q 24 25, 24 28 Q 24 31, 28 31" /><path d="M82 60 L 88 35 L 92 38 L 86 63 L 82 60" />
            </svg>
        </div>
        <h2 class="text-2xl md:text-4xl handwritten"><span id="sectionTitle" class="marker-highlight"></span></h2>
    </header>

    <main id="mainContent" class="max-w-6xl mx-auto px-2"></main>

    <button id="fab" onclick="openAddModal()" class="fixed bottom-6 right-6 w-16 h-16 text-white rounded-full flex items-center justify-center text-4xl z-50 shadow-2xl" style="background: #7a9eb5; border: 2px solid white;">+</button>

    <!-- Modals -->
    <div id="viewModal" class="modal"><button class="self-end p-6 text-5xl" onclick="closeModal()">✖</button>
        <div class="max-w-4xl w-full px-6 pb-20 text-center">
            <h2 id="mTitle" class="text-4xl md:text-7xl handwritten font-bold mb-2"></h2>
            <p id="mAuthor" class="text-2xl opacity-60 mb-8"></p>
            <div id="mText" class="sketch-border p-8 bg-white text-right text-2xl kalam whitespace-pre-wrap shadow-inner"></div>
        </div>
    </div>

    <div id="addModal" class="modal"><button class="self-end p-6 text-5xl" onclick="closeModal()">✖</button>
        <form onsubmit="hSaveStory(event)" class="max-w-xl w-full p-6 flex flex-col gap-6">
            <h2 class="text-4xl handwritten font-bold text-center">עריכת קטע</h2>
            <input id="t" required placeholder="כותרת היצירה">
            <input id="a" required placeholder="שם הכותב.ת">
            <textarea id="c" rows="8" required placeholder="כאן כותבים..."></textarea>
            <button id="sb" type="submit" class="bg-blue-600 text-white py-4 rounded-xl text-3xl handwritten">פרסום</button>
        </form>
    </div>

    <div id="addIllusModal" class="modal"><button class="self-end p-6 text-5xl" onclick="closeModal()">✖</button>
        <form onsubmit="hSaveIllus(event)" class="max-w-xl w-full p-6 flex flex-col gap-6">
            <h2 class="text-4xl handwritten font-bold text-center">הוספת איור</h2>
            <input id="it" required placeholder="כותרת האיור">
            <input type="file" id="ip" accept="image/*">
            <button id="ib" type="submit" class="bg-blue-600 text-white py-4 rounded-xl text-3xl handwritten">שמירה</button>
        </form>
    </div>

    <div id="addPartModal" class="modal"><button class="self-end p-6 text-5xl" onclick="closeModal()">✖</button>
        <form onsubmit="hSavePart(event)" class="max-w-xl w-full p-6 flex flex-col gap-6">
            <h2 class="text-4xl handwritten font-bold text-center">הצטרפות</h2>
            <div class="grid grid-cols-2 gap-4"><input id="f" required placeholder="שם פרטי"><input id="l" required placeholder="משפחה"></div>
            <input type="file" id="pp" accept="image/*">
            <button id="pb" type="submit" class="bg-blue-600 text-white py-4 rounded-xl text-3xl handwritten">הוספה</button>
        </form>
    </div>
</body>
</html>
